      </div>`;
    }

    function renderSemantic() {
      function flattenTokens(obj, prefix = '') {
        const result = [];
        for (const [key, value] of Object.entries(obj)) {
          const path = prefix ? `${prefix}.${key}` : key;
          if (typeof value === 'string') {
            result.push({ path, value });
          } else if (typeof value === 'object') {
            result.push(...flattenTokens(value, path));
          }
        }
        return result;
      }

      const lightTokens = flattenTokens(semanticTokens.light);
      const darkTokens = flattenTokens(semanticTokens.dark);

      let out = `<div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="border-bottom:2px solid var(--border)">
              <th style="text-align:left;padding:8px 12px;color:var(--muted);font-weight:600">Token</th>
              <th style="text-align:left;padding:8px 12px;color:var(--muted);font-weight:600">Light</th>
              <th style="text-align:left;padding:8px 12px;color:var(--muted);font-weight:600">Dark</th>
            </tr>
          </thead>
          <tbody>`;

      for (let i = 0; i < lightTokens.length; i++) {
        const lt = lightTokens[i];
        const dt = darkTokens[i];
        const isColor = lt.value.startsWith('#');
        out += `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:8px 12px;font-family:monospace;color:var(--heading)">${lt.path}</td>
          <td style="padding:8px 12px">
            <span style="display:inline-flex;align-items:center;gap:8px">
              ${isColor ? `<span style="display:inline-block;width:18px;height:18px;border-radius:3px;background:${lt.value};border:1px solid var(--border)"></span>` : ''}
              <code style="color:var(--muted);cursor:pointer" onclick="copyHex('${lt.value}')">${lt.value}</code>
            </span>
          </td>
          <td style="padding:8px 12px">
            <span style="display:inline-flex;align-items:center;gap:8px">
              ${isColor ? `<span style="display:inline-block;width:18px;height:18px;border-radius:3px;background:${dt.value};border:1px solid var(--border)"></span>` : ''}
              <code style="color:var(--muted);cursor:pointer" onclick="copyHex('${dt.value}')">${dt.value}</code>
            </span>
          </td>
        </tr>`;
      }

      out += '</tbody></table></div>';
      return out;
    }

    // ── Render All ──
    const content = document.getElementById('content');
    content.innerHTML = sections.map(s => `
      <div class="section" id="${s.id}">
        <h2 class="section-title">${s.title}</h2>
        <p class="section-desc">${
          s.id === 'colors' ? 'Foundation color scales. Click any hex to copy. ★ marks the brand base color.' :
          s.id === 'typography' ? 'Manrope is the primary typeface across all Empowered Vote products.' :
          s.id === 'spacing' ? '4px base unit. Consistent spacing creates visual rhythm across all products.' :
          s.id === 'components' ? 'Interactive elements with hover, active, focus, and disabled states. Try hovering, clicking, and tabbing.' :
          s.id === 'forms' ? 'Form controls including selects, checkboxes, radios, textareas, and validation states.' :
          s.id === 'feedback' ? 'Alerts, toasts, tooltips, and empty states for communicating status to users.' :
          s.id === 'loading' ? 'Spinners, skeleton screens, progress bars, and empty states.' :
          s.id === 'navigation' ? 'Breadcrumbs, pagination, tabs, and menus for wayfinding.' :
          s.id === 'tables' ? 'Data tables and avatar components for displaying structured information.' :
          s.id === 'radar' ? 'Dual-overlay radar chart for comparing user compass vs. politician stances. Try the color presets or pick your own.' :
          s.id === 'comparison' ? 'Politician selection, stance comparison tables, legislative scores, and source citations.' :
          s.id === 'patterns' ? 'Reusable UI patterns found across Empowered Vote apps. Each adapts to light/dark mode.' :
          s.id === 'pillars' ? 'Each pillar has a dedicated accent color. Inform = Yellow, Empower = Coral, Connect = Teal.' :
          s.id === 'dataviz' ? '10 chart hues × 5 shades. Base shade (outlined) for segments, lighter for subcategories.' :
          s.id === 'semantic' ? 'Semantic tokens map to different values in light and dark modes. All dark mode colors meet WCAG AA (4.5:1+) contrast.' : ''
        }</p>
        ${s.render()}
      </div>
    `).join('');

    // ── Theme Toggle ──
    window.toggleTheme = () => {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        html.removeAttribute('data-theme');
      } else {
        html.setAttribute('data-theme', 'dark');
      }
      const nowDark = html.getAttribute('data-theme') === 'dark';
      document.querySelector('.sun-icon').style.display = nowDark ? 'none' : 'block';
      document.querySelector('.moon-icon').style.display = nowDark ? 'block' : 'none';
    };
  </script>
